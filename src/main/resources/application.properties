spring.application.name=mcne
spring.threads.virtual.enabled=true

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5435/${DB_NAME:mcne_db}
spring.datasource.username=${DB_USERNAME:mcne_user}
spring.datasource.password=${DB_PASSWORD:mcne_password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Web Server Config
server.port=8081

# Spring Boot Actuator — expose only safe endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# RabbitMQ Logs (Hides the huge stack trace when sending to DLQ)
#logging.level.org.springframework.amqp.rabbit.listener.ConditionalRejectingErrorHandler=ERROR

# AWS Configuration
# Keys default to blank so DefaultCredentialsProvider is used (IAM role / instance profile).
# Set real values only for local dev via .env — never commit credentials.
aws.region=${AWS_REGION:us-east-2}
aws.accessKeyId=${AWS_ACCESS_KEY:}
aws.secretKey=${AWS_SECRET_KEY:}
aws.ses.verified-email=${AWS_VERIFIED_EMAIL:none@example.com}

# Security — API key for protecting all /api/** endpoints.
# Override via MCNE_API_KEY environment variable in production.
mcne.security.api-key=${MCNE_API_KEY:dev-only-key}

# CORS — comma-separated list of allowed frontend origins.
# Override via MCNE_ALLOWED_ORIGINS in production.
mcne.cors.allowed-origins=${MCNE_ALLOWED_ORIGINS:http://localhost:5173}

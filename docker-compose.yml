services:
  postgres:
    image: postgres:16-alpine
    container_name: mcne-postgres
    environment:
      POSTGRES_USER: mcne_user
      POSTGRES_PASSWORD: mcne_password
      POSTGRES_DB: mcne_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: mcne-rabbitmq
    ports:
      - "5672:5672" # Default AMQP communication port
      - "15672:15672" # Management UI port

  mcne-app:
    build: .
    container_name: mcne-app
    ports:
      - "8081:8081"
    environment:
      # Connect to the postgres container on its internal port 5432
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/mcne_db
      - SPRING_DATASOURCE_USERNAME=mcne_user
      - SPRING_DATASOURCE_PASSWORD=mcne_password
      - SPRING_RABBITMQ_HOST=rabbitmq
      # AWS Credentials (read from the host OS terminal)
      - AWS_REGION=${AWS_REGION:-us-east-2}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_VERIFIED_EMAIL=${AWS_VERIFIED_EMAIL}
    depends_on:
      - postgres
      - rabbitmq

volumes:
  postgres_data: